<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Favicon source — render at 512×512, downscale to png/ico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700..800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0}
  html,body{width:512px;height:512px;overflow:hidden;background:transparent}
  .tile{
    width:512px; height:512px;
    background:#ffb000;
    border-radius:116px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Bricolage Grotesque',system-ui,sans-serif;
    font-weight:800;
    color:#0c0c0e;
    font-size:392px;
    line-height:1;
    letter-spacing:-0.04em;
    /* nudge the optical center of the B */
    padding-bottom:18px;
    box-sizing:border-box;
  }
</style>
</head>
<body>
  <div class="tile">B</div>
</body>
</html>
